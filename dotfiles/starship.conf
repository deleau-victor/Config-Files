"$schema" = 'https://starship.rs/config-schema.json'

palette = 'catppuccin_frappe'

format = """
 $os\
$username\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda \
$time\
$cmd_duration\
$line_break\
$character"""

[os]
disabled = false
style = "fg:red"

[os.symbols]
Windows = "¯£Å"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
Arch = "¾░úç"
Artix = "¾░úç"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "fg:red"
style_root = "fg:red"
format = '[ $user]($style)'

[directory]
style = "fg:peach"
format = " in [$path]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"T├®l├®chargements" = "´ÇÖ "
"Musique" = "¾░ØÜ "
"Images" = "´Ç¥ "
"Sources" = "¾░▓ï "

[git_branch]
symbol = "´Éÿ"
style = "fg:yellow"
format = ' on [[$symbol $branch](fg:yellow)]($style)'

[git_status]
style = "fg:yellow"
format = '[[($all_status$ahead_behind )](fg:yellow)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "fg:node"
format = 'with [[$symbol( $version)](fg:node)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "¯ÿº"
style = "fg:go"
format = '[[ $symbol( $version) ](fg:go)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "¯ëû "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "¯ÿå"
style = "fg:green"
format = 'with [[$symbol( $version)(\(#$virtualenv\))](fg:green)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " ´äî "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "fg:lavender"
format = 'at [[´É║ $time ](fg:lavender)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ÔØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ÔØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "¯½┤ in $duration "
style = "fg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

